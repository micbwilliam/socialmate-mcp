name: CI

# Runs the full suite (unit + packaging + contract-drift) on every push and PR.
# The contract-drift test reads the vendored test/fixtures/product-facts.json —
# refresh it from an SM4 checkout with `npm run sync:contract`.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm test
